name: Temporary Song Recognition

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - name: Install transcription model
        run: pip install --quiet faster-whisper
      - name: Extract Spanish lyrics
        run: |
          curl -L --fail -o clip.ogg https://raw.githubusercontent.com/yd-it-service/yd-it-website/main/__temp_song_clip.ogg
          ffmpeg -y -i clip.ogg -af "highpass=f=120,lowpass=f=6500,dynaudnorm=f=100:g=20" clean.wav >/dev/null 2>&1
          python - <<'PY'
          import json
          from faster_whisper import WhisperModel

          model = WhisperModel('small', device='cpu', compute_type='int8')
          output = {}
          for language in ('es', None):
              segments, info = model.transcribe(
                  'clean.wav',
                  language=language,
                  beam_size=10,
                  best_of=10,
                  temperature=0,
                  condition_on_previous_text=False,
                  vad_filter=False,
                  initial_prompt='Letra de una canción en español, música latina de discoteca.',
                  word_timestamps=True,
              )
              rows = []
              for s in segments:
                  rows.append({
                      'start': s.start,
                      'end': s.end,
                      'text': s.text.strip(),
                      'avg_logprob': s.avg_logprob,
                      'no_speech_prob': s.no_speech_prob,
                      'words': [w.word for w in (s.words or [])],
                  })
              output[str(language)] = {
                  'detected_language': info.language,
                  'language_probability': info.language_probability,
                  'segments': rows,
              }
          print(json.dumps(output, ensure_ascii=False, indent=2))
          open('transcript.json', 'w', encoding='utf-8').write(json.dumps(output, ensure_ascii=False, indent=2))
          PY
      - name: Upload transcript
        uses: actions/upload-artifact@v4
        with:
          name: lyrics-transcript
          path: transcript.json
