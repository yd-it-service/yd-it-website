name: Temporary Song Recognition

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch candidate preview
        run: |
          python - <<'PY'
          import json, urllib.parse, urllib.request

          query = urllib.parse.urlencode({
              'term': 'N/A Hey Girl Jin Akanishi Ryo Nishikido',
              'entity': 'song',
              'limit': 50,
              'country': 'JP',
          })
          with urllib.request.urlopen('https://itunes.apple.com/search?' + query, timeout=60) as r:
              data = json.loads(r.read())
          open('itunes-results.json', 'w', encoding='utf-8').write(json.dumps(data, ensure_ascii=False, indent=2))
          print(json.dumps(data, ensure_ascii=False, indent=2))

          candidates = [x for x in data.get('results', []) if x.get('trackName', '').lower() == 'hey girl']
          if not candidates:
              raise SystemExit('No Hey Girl candidate found')
          item = candidates[0]
          print('SELECTED', item.get('artistName'), item.get('trackName'), item.get('previewUrl'))
          with urllib.request.urlopen(item['previewUrl'], timeout=60) as r:
              open('candidate-preview.m4a', 'wb').write(r.read())
          PY
      - name: Upload candidate
        uses: actions/upload-artifact@v4
        with:
          name: candidate-preview
          path: |
            candidate-preview.m4a
            itunes-results.json
