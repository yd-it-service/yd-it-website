
<!-- YD-IT CONTACT FORM (Web3Forms) START -->
<section id="kontaktformular" style="margin-top:40px;">
  <h2>Kontaktformular</h2>

  <form action="https://api.web3forms.com/submit" method="POST" style="max-width:600px;display:flex;flex-direction:column;gap:10px;">
    
    <!-- Web3Forms Access Key -->
    <input type="hidden" name="access_key" value="388847ca-49d5-41a4-97cc-47607b22eb28">

    <label>Name</label>
    <input type="text" name="name" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">

    <label>E‑Mail</label>
    <input type="email" name="email" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">

    <label>Nachricht</label>
    <textarea name="message" required rows="6" style="padding:10px;border-radius:8px;border:1px solid #ccc;"></textarea>

    <button type="submit" style="padding:12px;border:none;border-radius:8px;background:#6366f1;color:white;font-weight:600;cursor:pointer;">
      Anfrage senden
    </button>

  </form>
</section>
<!-- YD-IT CONTACT FORM END -->
